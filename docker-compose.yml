# =============================================================
# VisionStream Docker Compose
# =============================================================
# Orchestrates three services:
#   api   — FastAPI application     (localhost:8000)
#   db    — PostgreSQL 16 database  (localhost:5432)
#   cache — Redis 7                 (localhost:6379)
#
# 📌 Lesson 5 Task:
#   Uncomment and complete each service definition below.
#
#   'api' service:
#     - build: . (use Dockerfile in project root)
#     - ports: "8000:8000"
#     - environment: DATABASE_URL, REDIS_URL, API_KEY
#     - depends_on: [db, cache]
#     - Restart policy: unless-stopped
#
#   'db' service:
#     - image: postgres:16-alpine
#     - environment: POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#     - volumes: postgres_data + mount db/schema.sql to initdb.d
#
#   'cache' service:
#     - image: redis:7-alpine
#     - ports: "6379:6379"
#
#   Start everything:
#     docker-compose up --build
# =============================================================

