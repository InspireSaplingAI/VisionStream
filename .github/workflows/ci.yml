# ================================================================
# VisionStream CI Pipeline
# ================================================================
# Triggers: every push to 'main' and every pull request to 'main'
#
# Jobs:
#   lint  — Check code style with Ruff
#   test  — Run pytest unit tests with coverage check
#
# 📌 Lesson 5 Task:
#   1. Uncomment and complete the 'lint' job:
#      - Checkout code
#      - Set up Python 3.11
#      - pip install ruff
#      - Run: ruff check app/ tests/
#
#   2. Uncomment and complete the 'test' job:
#      - Checkout code
#      - Set up Python 3.11
#      - pip install -r requirements.txt
#      - Run: pytest tests/ -v --cov=app --cov-fail-under=80
#             (--cov-fail-under=80 fails CI if coverage drops below 80%)
#
#   3. Push your changes to GitHub and watch the Actions tab
#   4. Fix any failures until you see the green checkmark
#   5. The green badge on your README proves CI is working
#
# Note: The test job uses SQLite (in-memory) via your test fixtures,
#       so no PostgreSQL or Redis service is needed in CI.
# ================================================================

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

